version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db_konteyneri
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ustasistemi
      POSTGRES_USER: ustauser
      POSTGRES_PASSWORD: 123456

  backend:
    build: ./usta_kapinda
    container_name: backend_konteyneri
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ustasistemi
      - DB_USER=ustauser
      - DB_PASSWORD=123456
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    # Django'nun veritabanı hazır olana kadar beklemesi için basit bir komut
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: frontend_konteyneri
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  
  
  
  
  
  
 
